<div class="bg-gray-50 py-16 px-4 md:px-8 lg:px-16 min-h-screen flex items-center justify-center">
  <div class="w-full max-w-lg bg-white p-8 rounded-lg shadow-lg animate-fade-in-up">
    <h2 class="text-3xl font-bold text-center mb-8 text-red-700">Contact Us</h2>
    <form>
      <div class="mb-4">
        <label class="block text-gray-700 mb-2" for="email">Email</label>
        <input id="email" type="email" class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-red-600" placeholder="Your email address" />
      </div>
      <div class="mb-4">
        <label class="block text-gray-700 mb-2" for="fullname">Full Name</label>
        <input id="fullname" type="text" class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-red-600" placeholder="Your full name" />
      </div>
      <div class="mb-4">
        <label class="block text-gray-700 mb-2" for="subject">Subject</label>
        <input id="subject" type="text" class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-red-600" placeholder="Message subject" />
      </div>
      <div class="mb-6">
        <label class="block text-gray-700 mb-2" for="message">Message</label>
        <textarea id="message" rows="5" class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-red-600" placeholder="Type your message here..."></textarea>
      </div>
      <button type="submit" class="w-full bg-red-700 text-white font-bold py-3 px-6 rounded-full shadow-md hover:bg-red-800 transition-colors duration-200">Send Message</button>
    </form>
    <div class="flex justify-center mt-8 space-x-4">
      <button mat-icon-button class="text-red-700 hover:text-red-800 transition-colors duration-200" aria-label="Twitter">
        <mat-icon>twitter</mat-icon>
      </button>
      <a href="https://www.facebook.com/ladanski/" mat-icon-button class="text-red-700 hover:text-red-800 transition-colors duration-200" aria-label="Facebook">
        <mat-icon>facebook</mat-icon>
      </a>
      <button mat-icon-button class="text-red-700 hover:text-red-800 transition-colors duration-200" aria-label="LinkedIn">
        <mat-icon>linkedin</mat-icon>
      </button>
      <button mat-icon-button class="text-red-700 hover:text-red-800 transition-colors duration-200" aria-label="Instagram">
        <mat-icon>instagram</mat-icon>
      </button>
    </div>
  </div>
</div>
