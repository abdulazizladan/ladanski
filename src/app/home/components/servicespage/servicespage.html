<div class="bg-gray-50 py-16 px-4 md:px-8 lg:px-16 min-h-screen">
  <div class="max-w-6xl mx-auto">
    <h2 class="text-4xl font-bold text-center mb-12 text-red-700 animate-slide-in-left">Our Services</h2>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      @for(service of services; track service) {
        <div class="bg-white p-6 rounded-lg shadow-lg hover:shadow-xl transition-shadow duration-300 transform hover:-translate-y-1 animate-fade-in-up">
            <div class="text-5xl mb-4 text-center text-red-600">{{ service.icon }}</div>
            <h3 class="text-2xl font-semibold text-center mb-3">{{ service.name }}</h3>
            <p class="text-gray-700 text-center">{{ service.description }}</p>
        </div>
        }
    </div>
  </div>
</div>
