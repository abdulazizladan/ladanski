<div fxLayout.gt-xs="row" fxLayoutAlign="center">
  <span fxFlex.gt-xs="100%"></span>
  <div fxLayout="column" id="main" fxLayoutGap="25px" fxFlex.gt-xs="900px">

    <div height="20"></div>
    <mat-card class="mat-elevation-z4" *ngFor="let post of posts$ | async">
      <mat-card-header>
        <mat-card-title>{{ post.title | titlecase }}</mat-card-title>
        <mat-card-subtitle>{{ post.date_published | date }}</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        {{ post.paragraphs[0].paragraph }}
      </mat-card-content>
      <mat-card-actions align="end">
        <button mat-flat-button color="primary">Read</button>
      </mat-card-actions>
    </mat-card>

  </div>
  <span fxFlex.gt-xs="100%"></span>
</div>
